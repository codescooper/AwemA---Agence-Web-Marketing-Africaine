name: Sync présence digitale (réseaux)

# Récupère les métriques sociales réelles d'un client (Meta Graph API) et met à jour
# son reseaux.json + le registre agence.js. Le runner GitHub a accès à Internet
# (contrairement au sandbox de génération) → graph.facebook.com fonctionne ici.
#
# PRÉ-REQUIS (une fois) — dans le dépôt :
#   Settings → Secrets and variables → Actions
#     Secret  : META_TOKEN     (token Page/IG avec pages_read_engagement, instagram_basic,
#                               instagram_manage_insights)
#     Variable: FB_PAGE_ID     (ID de la Page Facebook)
#     Variable: IG_USER_ID     (ID du compte Instagram Business)
#     Variable: CLIENT_DIR     (ex: departements/marketing/clients/la-grande-vision)
#
# Lancement : onglet Actions → ce workflow → "Run workflow" (ou planifié chaque lundi 06:00).

on:
  workflow_dispatch:
    inputs:
      client_dir:
        description: "Dossier client (laisser vide pour utiliser la variable CLIENT_DIR)"
        required: false
  schedule:
    - cron: "0 6 * * 1"   # tous les lundis à 06:00 UTC

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Récupérer les métriques réseaux (Meta Graph API)
        env:
          META_TOKEN:  ${{ secrets.META_TOKEN }}
          FB_PAGE_ID:  ${{ vars.FB_PAGE_ID }}
          IG_USER_ID:  ${{ vars.IG_USER_ID }}
        run: |
          CLIENT="${{ github.event.inputs.client_dir }}"
          [ -z "$CLIENT" ] && CLIENT="${{ vars.CLIENT_DIR }}"
          if [ -z "$META_TOKEN" ] || [ -z "$CLIENT" ]; then
            echo "::error::META_TOKEN (secret) et CLIENT_DIR (variable) sont requis."; exit 1
          fi
          echo "Sync réseaux pour: $CLIENT"
          python3 scripts/connect-reseaux.py --meta "$CLIENT"

      - name: Régénérer le registre agence
        run: python3 outils/_data/build.py

      - name: Commit si changements
        run: |
          git config user.name "awema-bot"
          git config user.email "bot@awema.local"
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore(réseaux): sync présence digitale ($(date -u +%F))"
            git push
            echo "✅ reseaux.json mis à jour."
          else
            echo "ℹ️ Aucune nouvelle donnée."
          fi
